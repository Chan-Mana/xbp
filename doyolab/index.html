<!DOCTYPE html>
<style>
@font-face {
  font-family: Moderne Sans;
  src: url(https://s3-us-west-2.amazonaws.com/s.cdpn.io/4273/moderne_sans.woff2);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #000;
}

/* 背景を画像に変更 */
.video-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;

  background-image: url("your-image.jpg"); /* ←ここ変える */
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  /* フェードイン */
  opacity: 0;
  filter: blur(12px);
  animation: fadeInBg 2.5s ease forwards;
}

/* 暗さレイヤー */
.video-bg::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  top: 0;
  left: 0;
}

/* アニメーション */
@keyframes fadeInBg {
  from {
    opacity: 0;
    filter: blur(12px) brightness(0.7);
  }
  to {
    opacity: 1;
    filter: blur(0) brightness(1);
  }
}

div#fashion {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

header {
  position: fixed;
  width: 100%;
  text-align: center;
  color: white;
  transition: 0.4s;
}

header:hover {
  background: rgba(255, 255, 255, 0.8);
  color: #000;
}

h1 {
  font-family: Moderne Sans, sans-serif;
  font-size: 2.5rem;
  letter-spacing: 0.5rem;
}

h4 {
  font-family: Moderne Sans, sans-serif;
  font-size: 0.8rem;
  letter-spacing: 0.2rem;
}

nav a {
  text-decoration: none;
  color: inherit;
  padding: 1rem;
}

h2 {
  font-family: Georgia, serif;
  font-size: 8vmin;
  text-align: center;
  margin: 2rem 3rem 0;
  color: #fff;
  font-weight: 100;
}

h3 {
  font-family: Georgia, serif;
  font-size: 3vmin;
  text-align: center;
  margin: 2rem 3rem 0;
  color: #fff;
  font-weight: 100;
}
</style>
